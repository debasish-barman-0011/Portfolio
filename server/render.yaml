services:
  - type: web
    name: debasish-portfolio-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LOCKER_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
